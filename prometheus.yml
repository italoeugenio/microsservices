global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8081

  - job_name: stock-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - stock-service:8082

  - job_name: email-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - email-service:8080

  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692
